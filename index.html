<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>GitHub Stalker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstra
p.min.css"  rel="stylesheet">
</head>    
<body class="bg-dark text-white p-5">
    <div class="container text-center" style="max-width: 500px;">
        <h1 class="text-into mb-4">GitHub Stalker</h1>

        <input type="text" id="in-user" class="form-control mb-3" 
    placeholder="Digite o username (ex: diego3g, filipedeschamps)">
        <button onclick="buscarUsuario()" class="btn btn-info w-100 mb-4">Vasculhar Servidor</button>

        <div id="loading" class="spinner-border text-info d-none mb-3" role="status"></div>

        <div id="resultado"></div>
</div>
</body>
<script>
    async function buscarUsuario(){
        let username = document.getElementById('in-user').value;
        if  (username  === (" ")) {
            throw new Error("Por favor, digite um nome de usuário!");
        }
        let divResultado = document.getElementById('resultado');
        let loading = document.getElementById('loading');
 
        divResultado.innerHTML = "";
        loading.classList.remove('d-none');

        try {
            let resposta = await
            fetch(`https://api.github.com/users/${username}`);
            
            if (!resposta.ok) {
                throw new Error("Usuário não encontrado no GitHub!");
            }
            
            let dados = await resposta.json();

            divResultado.innerHTML = `
                <div class="card bg-secundary p-3">
                    <img src="${dados.avatar_url}" width="120" class="rounded-circle mx-auto mb-3">
                    <h3>${dados.name || username}</h3>
                    <p>Seguidores: ${dados.followers}</p>
                    <p>Biografia${dados.bio}</p>
                    <p>location${dados.location || "Localização desconhecida"}</P>
                </div>
            `;        
        } catch (erroTratado) {
            console.error(erroTratado);
            divResultado.innerHTML = `<div class="alert alert-danger">${erroTratado.message}</div>`;
        } finally {
            loading.classList.add('d-none');

            let respostaRepos = await
            fetch(`https://api.github.com/users/${username}/repos `);
            if (!respostaRepos.ok) {
                throw new Error("Não foi possível carregar os repositórios");

            let dadosRepos = await respostaRepos.json();    
            }
        }
    }
</script>
</html>
